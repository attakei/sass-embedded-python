name: 'Run CI jobs'

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e  # v4.0.5
        with:
          aqua_version: v2.60.1
      - name: 'Configure dependencies'
        run: |
          uv sync --frozen --all-extras
      - name: 'Run linters'
        run: |
          lefthook run pre-commit --all-files  prebuild:
  python-test:
    needs: 'lint'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        python:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        workspace: ['locked', 'latest']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e  # v4.0.5
        with:
          aqua_version: v2.60.1
      - name: 'Configure workspace'
        run: |
          echo ${{ matrix.python }} > .python-version
          uv sync --all-groups --all-extras ${{ (matrix.workspace == 'latest' && '-U') || '--frozen' }}
          uv run python -m sass_embedded.dart_sass
      - name: 'Run test'
        run: |
          uv run pytest
  os-smoke-test:
    needs: 'lint'
    runs-on: '${{ matrix.runner }}'
    strategy:
      fail-fast: false
      matrix:
        runner:
          - 'windows-latest'
          - 'macos-latest'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e  # v4.0.5
        with:
          aqua_version: v2.60.1
      - name: 'Configure workspace'
        run: |
          uv sync --frozen --all-groups --all-extras
          uv run python -m sass_embedded.dart_sass
      - name: 'Run test'
        run: |
          uv run pytest
  linux-libc-test:
    needs: 'lint'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - { image: 'quay.io/pypa/manylinux_2_28_x86_64', expected_libc: 'gnu'  }
          - { image: 'quay.io/pypa/musllinux_1_2_x86_64',  expected_libc: 'musl' }
    container:
      image: '${{ matrix.image }}'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: 'Run test'
        env:
          EXPECTED_OS: 'linux'
          EXPECTED_ARCH: 'x64'
          EXPECTED_LIBC: '${{ matrix.expected_libc }}'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.local/bin/env
          uv run python -m sass_embedded.dart_sass
          uv run pytest
  env-coverage-test:
    needs: 'lint'
    runs-on: '${{ matrix.runner }}'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: 'ubuntu-latest',    expected_os: 'linux',   expected_arch: 'x64',   expected_libc: 'gnu' }
          - { runner: 'ubuntu-24.04-arm', expected_os: 'linux',   expected_arch: 'arm64', expected_libc: 'gnu' }
          - { runner: 'windows-latest',   expected_os: 'windows', expected_arch: 'x64',   expected_libc: 'gnu' }
          # TODO: Re-enable when Windows-on-ARM share warrants arch detection work.
          # uv installs x64 Python on windows-11-arm, so platform.machine() reports AMD64
          # under emulation and resolve_arch() returns 'x64' instead of 'arm64'.
          # Reactivate once we add Windows-on-ARM emulation handling (see NOTES_windows-arm.md).
          # - { runner: 'windows-11-arm',   expected_os: 'windows', expected_arch: 'arm64' }
          - { runner: 'macos-latest',     expected_os: 'macos',   expected_arch: 'arm64', expected_libc: 'gnu' }
          # TODO: Re-enable when macOS x64 hosted runner availability stabilizes.
          # macos-13 jobs frequently stay in status=queued for hours because the Intel
          # macOS hosted runner pool is small; timeout-minutes does not cover queue time
          # (counts execution time only), so allow_failure cannot rescue the workflow.
          # macOS x64 dispatch is still covered indirectly by tests/test_dart_sass.py.
          # - { runner: 'macos-13',         expected_os: 'macos',   expected_arch: 'x64'   }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v5
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e  # v4.0.5
        with:
          aqua_version: v2.60.1
      - name: 'Configure workspace'
        run: |
          uv sync --frozen
      - name: 'Run env dispatch tests'
        env:
          EXPECTED_OS: ${{ matrix.expected_os }}
          EXPECTED_ARCH: ${{ matrix.expected_arch }}
          EXPECTED_LIBC: ${{ matrix.expected_libc }}
        run: |
          uv run pytest tests/test_env_dispatch.py -v
  doc-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e  # v4.0.5
        with:
          aqua_version: v2.60.1
      - name: 'Configure dependencies'
        run: |
          task setup-dev
      - name: 'Run build'
        run: |
          task docs:build-linkcheck
          task docs:build-dirhtml
  build-platform-wheel:
    needs: 'lint'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        platform:
          - 'win_amd64'
          - 'manylinux_2_17_x86_64'
          - 'manylinux_2_17_aarch64'
          - 'musllinux_1_2_x86_64'
          - 'musllinux_1_2_aarch64'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e  # v4.0.5
        with:
          aqua_version: v2.60.1
      - name: 'Build wheel'
        run: |
          uv sync
          BUILD_FOR_PLATFORM=${{ matrix.platform }} uv build --wheel
      - uses: actions/upload-artifact@v7
        with:
          name: 'wheel-${{ matrix.platform }}'
          path: dist
  verify-wheel:
    needs:
      - 'python-test'
      - 'os-smoke-test'
      - 'linux-libc-test'
      - 'env-coverage-test'
      - 'build-platform-wheel'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: 'manylinux_2_17_x86_64',  runner: 'ubuntu-latest',    container: 'quay.io/pypa/manylinux_2_28_x86_64',  expected_os: 'linux',   expected_arch: 'x64',   expected_libc: 'gnu'  }
          - { platform: 'manylinux_2_17_aarch64', runner: 'ubuntu-24.04-arm', container: 'quay.io/pypa/manylinux_2_28_aarch64', expected_os: 'linux',   expected_arch: 'arm64', expected_libc: 'gnu'  }
          - { platform: 'musllinux_1_2_x86_64',   runner: 'ubuntu-latest',    container: 'quay.io/pypa/musllinux_1_2_x86_64',   expected_os: 'linux',   expected_arch: 'x64',   expected_libc: 'musl' }
          # TODO: Re-enable musllinux_1_2_aarch64 once GitHub Actions supports
          # JavaScript actions inside Alpine containers on ARM64 runners.
          # See https://github.com/actions/runner/issues/801
          # - { platform: 'musllinux_1_2_aarch64',  runner: 'ubuntu-24.04-arm', container: 'quay.io/pypa/musllinux_1_2_aarch64',  expected_os: 'linux',   expected_arch: 'arm64', expected_libc: 'musl' }
          - { platform: 'win_amd64',              runner: 'windows-latest',   container: '',                                    expected_os: 'windows', expected_arch: 'x64',   expected_libc: 'gnu'  }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: 'wheel-${{ matrix.platform }}'
          path: dist
      - name: 'Install uv (Linux container)'
        if: ${{ matrix.container != '' }}
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e  # v4.0.5
        if: ${{ matrix.container == '' }}
        with:
          aqua_version: v2.60.1
      - name: 'Build venv and install wheel'
        shell: bash
        run: |
          uv venv .wheel-venv --python 3.10
          uv pip install --python .wheel-venv --no-cache pytest
          uv pip install --python .wheel-venv --no-cache dist/*.whl
      - name: 'Verify bundled binary present and runnable'
        shell: bash
        run: |
          if [ -f .wheel-venv/bin/activate ]; then
            source .wheel-venv/bin/activate
          else
            source .wheel-venv/Scripts/activate
          fi
          python tools/verify-wheel.py
      - name: 'Run pytest against wheel-installed package'
        shell: bash
        env:
          EXPECTED_OS: ${{ matrix.expected_os }}
          EXPECTED_ARCH: ${{ matrix.expected_arch }}
          EXPECTED_LIBC: ${{ matrix.expected_libc }}
        run: |
          if [ -f .wheel-venv/bin/activate ]; then
            source .wheel-venv/bin/activate
          else
            source .wheel-venv/Scripts/activate
          fi
          python -m pytest tests/
